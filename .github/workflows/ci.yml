name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default: jobs only read the repo to check it out. A job that
# needs more (e.g. SARIF upload) opts in with its own permissions block.
permissions:
  contents: read

# Cancel superseded PR runs; let main-branch runs finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Actions are pinned to full commit SHAs with a trailing version comment.
# Dependabot (.github/dependabot.yml) bumps the SHA and the comment together.
jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  image-scan:
    name: Build + Trivy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build image
        run: docker build -t projects-cockpit-mcp:ci .
      - name: Scan image (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: projects-cockpit-mcp:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
