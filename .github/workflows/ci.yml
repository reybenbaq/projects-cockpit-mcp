name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default: jobs only read the repo to check it out. A job that
# needs more (e.g. SARIF upload) opts in with its own permissions block.
permissions:
  contents: read

# Cancel superseded PR runs; let main-branch runs finish (github_actions_standards §8).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Actions are pinned to full commit SHAs with a trailing version comment
# (github_actions_standards §2). Dependabot (.github/dependabot.yml) bumps the
# SHA and the comment together.
jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  image-scan:
    name: Build + Trivy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build image
        run: docker build -t projects-cockpit-mcp:ci .
      - name: Scan image (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: projects-cockpit-mcp:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
